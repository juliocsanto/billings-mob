name: CI

# Triggers: push/PR into main or develop.
# All jobs must pass before merging to main (enforce via branch protection rules).
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint API (TypeScript — strict, max-warnings 0)
        # Sprint 1: API TypeScript files must pass with zero warnings.
        # OWASP A03: no-eval, no-implied-eval, eqeqeq enforced.
        run: npm run lint:api

      - name: Lint src (JS/JSX — pre-TypeScript migration, warnings allowed)
        # Legacy .jsx files have prop-types warnings pending the JSX→TSX migration (Sprint 2).
        # Runs without --max-warnings to avoid blocking CI on pre-existing tech debt.
        run: npm run lint
        continue-on-error: false

  # ─── Job 2: Type Check ───────────────────────────────────────────────────────
  # Enforces TypeScript strict mode (ADR-002). Runs in parallel with lint.
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        # Runs tsc -b --noEmit using project references (tsconfig.json → tsconfig.app.json).
        # strict: true enforced per ADR-002. allowJs: true enables incremental JSX→TSX migration.
        run: npm run typecheck

  # ─── Job 3: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests with coverage (Sprint 1)
        # Sprint 1: Vitest configured with vitest.config.ts.
        # Unit tests cover pure function modules: vectorClock, sanitizeAuditData, Zod schemas.
        # Integration tests (Hono endpoint handlers against Supabase local) are deferred to Sprint 2.
        # Coverage targets (ARCHITECTURE.md §10.1): >= 80% global — enforced Sprint 2+.
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 30

      # Sprint 2+: uncomment after configuring Codecov token in GitHub Secrets.
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     fail_ci_if_error: true
      #     files: ./coverage/lcov.info

  # ─── Job 4: Security ─────────────────────────────────────────────────────────
  # OWASP A06 (Vulnerable Components) + secret scanning. Runs in parallel.
  # Unblocks merge if HIGH or CRITICAL vulnerabilities are found (ADR-002, Stage 5).
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Dependency vulnerability audit (OWASP A06)
        # Fails CI on HIGH or CRITICAL vulnerabilities.
        # MODERATE vulnerabilities generate a warning but do not block.
        run: npm audit --audit-level=high

      - name: Dependency audit (MODERATE — warning only)
        run: npm audit --audit-level=moderate 2>&1 | tee audit-moderate.txt || true
        continue-on-error: true

      - name: Upload moderate audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-moderate-${{ github.sha }}
          path: audit-moderate.txt
          retention-days: 30

      - name: Secret scanning (TruffleHog)
        # Scans the git history for accidentally committed secrets.
        # Detects API keys, tokens, credentials (OWASP A05).
        # Pinned to exact version — supply chain integrity (security-policy-ci.md §5).
        # --results=verified,unverified: catches secrets whose provider API is unreachable
        # at scan time (Anthropic, Supabase). --only-verified silently passes those.
        # On push to main: base=github.event.before (the SHA before the push) so that
        # TruffleHog has a diff range to scan. On PR: base=default branch works correctly.
        uses: trufflesecurity/trufflehog@v3.82.6
        with:
          path: ./
          base: ${{ github.event_name == 'push' && github.event.before || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unverified

  # ─── Job 5: Build ────────────────────────────────────────────────────────────
  # Only runs after lint, typecheck, test, and security all pass.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          # Production values live in Vercel env vars (ADR-007).
          # These placeholders allow CI to verify the build succeeds without secrets.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.placeholder.app' }}

      - name: Scan build output for secret patterns (LGPD)
        # Ensures no secrets are baked into the Vite build output (security-policy-ci.md §6).
        # Catches Supabase service_role keys, JWT secrets, and API tokens in dist/.
        run: |
          if grep -rE "(ANTHROPIC|service_role|JWT_SECRET|WHATSAPP_API_TOKEN)" dist/ 2>/dev/null; then
            echo "::error::Secret pattern found in build output — do not deploy"
            exit 1
          fi
          echo "Build output clean — no secret patterns detected"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

      # Sprint 1: uncomment after adding "build:size-check" script to package.json.
      # Performance budget: JS bundle < 200KB gzipped (ARCHITECTURE.md §4 Stage 4).
      # - name: Bundle size check
      #   run: npm run build:size-check
