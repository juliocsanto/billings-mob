# Connect this repo to Vercel dashboard first: vercel.com/new
# After connecting, populate these secrets in GitHub repo settings:
#   VERCEL_TOKEN       — from Vercel account settings → Tokens
#   VERCEL_ORG_ID      — from Vercel project settings → General → Team ID
#   VERCEL_PROJECT_ID  — from Vercel project settings → General → Project ID

name: Deploy to Vercel

on:
  push:
    branches: [main]

# Only run after CI passes (ci.yml must be green on main)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
