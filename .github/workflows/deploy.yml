# Connect this repo to Vercel dashboard first: vercel.com/new
# After connecting, populate these secrets in GitHub repo settings:
#   VERCEL_TOKEN       — from Vercel account settings → Tokens (classic personal access token)
#   VERCEL_ORG_ID      — from Vercel project settings → General → Team ID (team_...)
#   VERCEL_PROJECT_ID  — from Vercel project settings → General → Project ID (prj_...)

name: Deploy to Vercel

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Only run after CI passes (ci.yml must be green on main)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    environment: production
    # Only deploy when the CI workflow completed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Production)
        run: |
          vercel deploy --prod \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" \
            --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
