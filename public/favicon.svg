<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <title>Billings Gráfico</title>
  <!-- Top-left: ● sangramento (filled circle) -->
  <circle cx="6" cy="6" r="4" fill="#A03030"/>
  <!-- Top-right: | seco (vertical line — dry day / PBI) -->
  <line x1="18" y1="2" x2="18" y2="10" stroke="#2E6040" stroke-width="2.25" stroke-linecap="round"/>
  <!-- Bottom-left: ○ muco (open ring) -->
  <circle cx="6" cy="18" r="4" fill="none" stroke="#806020" stroke-width="1.5"/>
  <!-- Bottom-right: ✕ ápice (last lubricative day) -->
  <line x1="15.2" y1="15.2" x2="20.8" y2="20.8" stroke="#8C3C28" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20.8" y1="15.2" x2="15.2" y2="20.8" stroke="#8C3C28" stroke-width="1.5" stroke-linecap="round"/>
</svg>
