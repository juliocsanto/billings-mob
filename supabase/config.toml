# Supabase CLI — Configuração de Desenvolvimento Local
# Referência: https://supabase.com/docs/reference/cli/config
# Projeto: Billings Gráfico (billings-mob)

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
# Supabase Realtime para atualização em tempo real do dashboard da instrutora
# Canal por instrutora: "instructor:{instructor_id}"
# Canal por aluna: "student:{student_id}"
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"
# PDFs de gráficos Billings — bucket: "cycle-reports"
# Política: apenas o dono pode ler; instrutora vinculada pode ler PDFs da aluna

[storage.image_transformation]
enabled = false

[auth]
enabled = true
site_url = "https://billings-web.vercel.app"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5174",
  "https://billings-mob.vercel.app",
  "https://billings-web.vercel.app"
]
jwt_expiry = 3600            # 1 hora — ADR-005 (curta duração + refresh token)
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 600

[auth.email.smtp]
host = "inbucket"
port = 2500
user = "admin"
pass = "admin"
admin_email = "admin@billings.local"
sender_name = "Billings Gráfico (Dev)"

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = false

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
# Edge Functions usadas:
#   supabase/functions/claude-stream/ — streaming SSE com Claude (ADR-007)
#   supabase/functions/whatsapp-webhook/ — receber webhooks da Meta (ADR-009)

[analytics]
enabled = false

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
